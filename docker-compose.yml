services:
  stash-listener:
    build: ./stash-listener
    container_name: stash-listener
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/session:/data/session   # Kurigram 登录 session
      - ./data/db:/data/db             # SQLite
      - ./data/tmp:/data/tmp           # 下载临时目录，处理完就删

  # 备用：Pyrogram 无法覆盖的场景（如批量回溯整个频道的时间窗口导出）
  # 使用：docker compose run --rm tdl-sync tdl -n archiver <命令>
  tdl-sync:
    build: ./tdl-sync
    env_file: .env
    volumes:
      - ./data/tdl-session:/root/.tdl
      - ./data/db:/data/db
      - ./data/tmp:/data/tmp
    profiles:
      - manual

# 本地开发：docker compose build && docker compose up -d
services:
  stash-listener:
    build: ./stash-listener
    container_name: stash-listener
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/session:/data/session
      - ./data/db:/data/db
      - ./data/tmp:/data/tmp

  tdl-sync:
    build: ./tdl-sync
    env_file: .env
    volumes:
      - ./data/tdl-session:/root/.tdl
      - ./data/db:/data/db
      - ./data/tmp:/data/tmp
    profiles:
      - manual
